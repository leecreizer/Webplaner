# GitHub Pages 배포 — gh-pages 브랜치 방식 (Pages build_type=legacy).
# actions/deploy-pages(workflow 방식)가 "Deployment failed, try again later"를
# 반복해 branch 방식으로 전환(2026-07-03). dist 를 gh-pages 로 강제 푸시하면
# Pages 가 자동 서빙한다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feat/three-upgrade-ssgi]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Pages는 /Webplaner/ 하위 경로로 서빙되므로 base 지정
      - run: npx tsc -b && npx vite build --base=/Webplaner/
      - name: Push dist to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
